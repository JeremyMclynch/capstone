# ============================================================
# Decawave DWM3001CDK Configuration
# Embedded nRF52833 + QM33120 (DW3720-compatible) UWB module
# Default role: TAG
# ============================================================

# Chip variant: raw SPI reads 0xDECA0302 (DW3000 family, non-PDOA silicon).
# Using DW3000 driver (devid=0xDECA0312, mask=0xFFFFFF0F) which matches 0x0302.
CONFIG_DW3000_CHIP_DW3000=y

# Node role: tag by default for DWM3001CDK
CONFIG_NODE_ROLE_TAG=y

# Node address for this tag (change per device)
# Tag addresses: 0x0100, 0x0101, 0x0102, ...
CONFIG_UWB_NODE_SHORT_ADDR=0x0100

# UART log backend
CONFIG_LOG_BACKEND_UART=y

# Log thread at priority 1 (just below UWB thread at 2, above everything else)
CONFIG_LOG_PROCESS_THREAD_CUSTOM_PRIORITY=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=1

# Reduce settings partition from 32KB to 16KB (512KB flash is tight with MCUboot)
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x4000

# --- RAM savings (nRF52833 has only 128KB RAM) ---
# Override prj.conf stack/heap increases that were needed for anchor's MCUmgr crash
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# --- nRF SDK-specific settings (not in upstream Zephyr) ---
CONFIG_COAP_UTILS=y
CONFIG_MBEDTLS_SHA1_C=n
CONFIG_DK_LIBRARY=y

# --- MCUmgr OTA (SMP over UDP) ---
CONFIG_MCUMGR=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV6=y
CONFIG_MCUMGR_TRANSPORT_UDP_STACK_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_UDP_THREAD_PRIO=5
CONFIG_NET_SOCKETS_POLL_MAX=6
