# ============================================================
# nRF52840 DK + DWM3000EVB Shield Configuration
# Default role: ANCHOR
# ============================================================

# DW3000 chip variant (standard DW3000 on DWM3000EVB)
CONFIG_DW3000_CHIP_DW3000=y

# Node role: anchor by default for nRF52840DK
CONFIG_NODE_ROLE_ANCHOR=y

# Node address for this anchor (change per device)
# Anchor addresses: 0x0001, 0x0002, 0x0003, ...
CONFIG_UWB_NODE_SHORT_ADDR=0x0001

# UART1 must be disabled for DWM3000EVB shield SPI polarity/phase pins
# (already handled in shield overlay)

# Disable external QSPI NOR flash (MX25R6435F) - we don't need it
# and it can hang during init on some hardware configurations
CONFIG_NORDIC_QSPI_NOR=n

# UART log backend (output via J-Link virtual COM port, /dev/ttyACM1 or ACM2)
CONFIG_LOG_BACKEND_UART=y

# Log thread at priority 1 (just below UWB thread at 2, above everything else)
CONFIG_LOG_PROCESS_THREAD_CUSTOM_PRIORITY=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=1

# --- nRF SDK-specific settings (not in upstream Zephyr) ---
CONFIG_COAP_UTILS=y
CONFIG_PM_PARTITION_SIZE_SETTINGS_STORAGE=0x8000
CONFIG_MBEDTLS_SHA1_C=n
CONFIG_DK_LIBRARY=y

# --- MCUmgr OTA (SMP over UDP) ---
CONFIG_MCUMGR=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV6=y
CONFIG_MCUMGR_TRANSPORT_UDP_STACK_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_UDP_THREAD_PRIO=5
CONFIG_NET_SOCKETS_POLL_MAX=6
