# ============================================================
# Seeed XIAO BLE (nRF52840) + DWM3000EVB (jumper wires)
# Default role: TAG (addr 0x0200)
# nRF52840: 1024KB flash, 256KB RAM — MCUboot dual-slot with OTA
# ============================================================

# DW3000 chip variant (standard DW3000 on DWM3000EVB)
CONFIG_DW3000_CHIP_DW3000=y

# Node role: anchor by default for XIAO BLE
CONFIG_NODE_ROLE_ANCHOR=y

# Node address for this tag
# Tag addresses: 0x0100 (DWM3001CDK), 0x0200 (XIAO), 0x0201, ...
CONFIG_UWB_NODE_SHORT_ADDR=0x0200

# Disable QSPI NOR flash (not needed for this application)
CONFIG_NORDIC_QSPI_NOR=n

# DK library for LED control (XIAO has 3 RGB LEDs, no buttons)
CONFIG_DK_LIBRARY=y

# Log backends
CONFIG_LOG_BACKEND_UART=y
CONFIG_USE_SEGGER_RTT=y
CONFIG_LOG_BACKEND_RTT=y

# Log thread at priority 1 (just below UWB thread at 2, above everything else)
CONFIG_LOG_PROCESS_THREAD_CUSTOM_PRIORITY=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=1

# MCUmgr for OTA updates (MCUboot enabled via sysbuild)
CONFIG_ZCBOR=y
CONFIG_MCUMGR=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_OS=y
CONFIG_MCUMGR_TRANSPORT_UDP=y
CONFIG_MCUMGR_TRANSPORT_UDP_IPV6=y
CONFIG_MCUMGR_TRANSPORT_UDP_STACK_SIZE=2048
CONFIG_MCUMGR_TRANSPORT_UDP_THREAD_PRIO=5
CONFIG_STREAM_FLASH=y

# Boot mode retention (enter MCUboot via UCI command)
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# --- nRF SDK-specific settings (not in upstream Zephyr) ---
CONFIG_COAP_UTILS=y
CONFIG_MBEDTLS_SHA1_C=n
