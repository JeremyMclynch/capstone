# ============================================================
# Seeed XIAO BLE (nRF52840) + DWM3000EVB (jumper wires)
# Default role: TAG (addr 0x0200)
# nRF52840: 1024KB flash, 256KB RAM — app-only with UF2 bootloader
# ============================================================

# DW3000 chip variant (standard DW3000 on DWM3000EVB)
CONFIG_DW3000_CHIP_DW3000=y

# Node role: tag by default for XIAO BLE
CONFIG_NODE_ROLE_TAG=y

# Node address for this tag
# Tag addresses: 0x0100 (DWM3001CDK), 0x0200 (XIAO), 0x0201, ...
CONFIG_UWB_NODE_SHORT_ADDR=0x0200

# Disable QSPI NOR flash (not needed for this application)
CONFIG_NORDIC_QSPI_NOR=n

# DK library for LED control (XIAO has 3 RGB LEDs, no buttons)
CONFIG_DK_LIBRARY=y

# UART log backend (output via USB-C CDC ACM)
CONFIG_LOG_BACKEND_UART=y

# Log thread at priority 1 (just below UWB thread at 2, above everything else)
CONFIG_LOG_PROCESS_THREAD_CUSTOM_PRIORITY=y
CONFIG_LOG_PROCESS_THREAD_PRIORITY=1

# No MCUboot on XIAO — app-only with UF2 bootloader
CONFIG_MCUMGR=n
CONFIG_IMG_MANAGER=n
CONFIG_MCUMGR_GRP_IMG=n
CONFIG_MCUMGR_GRP_OS=n
CONFIG_MCUMGR_TRANSPORT_UDP=n
CONFIG_STREAM_FLASH=n

# No boot mode retention (no MCUboot to enter)
CONFIG_RETAINED_MEM=n
CONFIG_RETENTION=n
CONFIG_RETENTION_BOOT_MODE=n

# --- nRF SDK-specific settings (not in upstream Zephyr) ---
CONFIG_COAP_UTILS=y
CONFIG_MBEDTLS_SHA1_C=n
