# ============================================================
# UWB Mesh Tracker - Base Project Configuration
# Board-specific overrides go in boards/<board>.conf
# ============================================================

# --- OpenThread (Full Thread Device) ---
CONFIG_OPENTHREAD_FTD=y
CONFIG_OPENTHREAD=y

# --- Networking ---
CONFIG_NETWORKING=y
CONFIG_NET_L2_OPENTHREAD=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=4
CONFIG_NET_CONNECTION_MANAGER=y

# --- CoAP ---
CONFIG_COAP=y
CONFIG_OPENTHREAD_COAP=y

# --- DW3000 UWB Driver ---
CONFIG_DW3000=y
CONFIG_SPI=y
CONFIG_GPIO=y

# --- System ---
CONFIG_FPU=y
CONFIG_NEWLIB_LIBC=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# --- Stacks & Heap ---
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

# --- OpenThread Network Parameters (override in boards/*.conf) ---
CONFIG_OPENTHREAD_NETWORKKEY="00:11:22:33:44:55:66:77:88:99:aa:bb:cc:dd:ee:ff"
CONFIG_OPENTHREAD_CHANNEL=15
CONFIG_OPENTHREAD_PANID=43981
CONFIG_OPENTHREAD_XPANID="11:11:11:11:22:22:22:22"

# --- Shell (disabled — UCI replaces it; saves ~3KB RAM) ---
CONFIG_SHELL=n
CONFIG_OPENTHREAD_SHELL=n

# --- Reboot support (for factory reset command) ---
CONFIG_REBOOT=y

# --- Boot mode retention (enter MCUboot serial recovery via UCI command) ---
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# --- UCI UART transport requires interrupt-driven RX ---
CONFIG_UART_INTERRUPT_DRIVEN=y

# --- Settings (needed for OpenThread credential storage) ---
CONFIG_SETTINGS=y
CONFIG_SETTINGS_RUNTIME=y
CONFIG_NVS=y

# --- Logging ---
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_DW3000_LOG_LEVEL_WRN=y

# --- IEEE 802.15.4 (Thread radio driver, L2 handled by OpenThread) ---
CONFIG_IEEE802154=y

