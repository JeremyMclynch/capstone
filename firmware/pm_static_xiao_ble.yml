# MCUboot partition layout for XIAO BLE (nRF52840, 1024KB flash)
# Replaces the stock UF2+SoftDevice layout (pm_static.yml in board dir)

mcuboot:
  address: 0x0
  size: 0xC000
  region: flash_primary

mcuboot_pad:
  address: 0xC000
  size: 0x200

app:
  address: 0xC200
  size: 0x6DE00

mcuboot_primary:
  address: 0xC000
  size: 0x6E000
  orig_span: &id001
    - mcuboot_pad
    - app
  span: *id001

mcuboot_secondary:
  address: 0x7A000
  size: 0x6E000
  region: flash_primary

mcuboot_scratch:
  address: 0xE8000
  size: 0x10000

settings_storage:
  address: 0xF8000
  size: 0x8000
  region: flash_primary

mcuboot_primary_app:
  address: 0xC000
  size: 0x6E000
  orig_span: *id001
  span: *id001

sram_primary:
  address: 0x20000000
  size: 0x40000
  region: sram_primary
