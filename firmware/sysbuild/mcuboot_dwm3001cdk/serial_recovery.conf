# MCUboot serial recovery for DWM3001CDK (nRF52833, 512KB flash)
# Hold button (P0.02) during reset to enter serial recovery mode.
# Upload firmware via: mcumgr --conntype serial --connstring dev=/dev/ttyACM3,baud=115200 image upload <file>
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=y

# Serial recovery takes over UART — must disable console
CONFIG_UART_CONSOLE=n

# Increase MCUboot partition to fit serial recovery code
CONFIG_PM_PARTITION_SIZE_MCUBOOT=0xC000

# Boot mode retention: enter serial recovery when app sets GPREGRET flag
CONFIG_BOOT_SERIAL_BOOT_MODE=y
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# Minimize MCUboot size
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
CONFIG_CONSOLE=n
CONFIG_TIMESLICING=n
CONFIG_CBPRINTF_NANO=y
